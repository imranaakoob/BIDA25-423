<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Radiara Checkout</title>
 <link rel="stylesheet" href="styles.css">
 <script src="script.js" defer></script>
</head>
 
<body>
 
<header class="navbar">
 <div class="logo">Radiara</div>
 <nav>
   <a href="index.html">Home</a>
   <a href="about.html">About</a>
   <a href="guides.html">Guides</a>
   <a href="products.html">Products</a>
   <a href="contact.html">Contact</a>
   <a href="checkout.html">Checkout</a>
 </nav>
</header>
 
<section class="hero">
 <h1>Your Glow Selection</h1>
 <p>Review your chosen essentials and finalize your order.</p>
</section>
 
<section class="grid">
 
 <!-- Left Side: Shipping & Payment -->
 <div class="card">
   <h2>Shipping & Payment</h2>
   <form id="checkoutForm" class="contact-form-layout">
     <input type="text" placeholder="Full Name" required>
     <input type="email" placeholder="Email Address" required>
     <input type="text" placeholder="Shipping Address" required>
     
     <div style="display: flex; gap: 10px;">
        <input type="text" placeholder="City" required>
        <input type="text" placeholder="Zip Code" required>
     </div>
 
     <h3 style="margin-top: 20px;">Payment</h3>
     <input type="text" placeholder="Card Number" required>
     
     <div style="display: flex; gap: 10px;">
        <input type="text" placeholder="MM/YY" required>
        <input type="text" placeholder="CVV" required>
     </div>
 
     <div class="form-button-wrapper" style="margin-top: 20px;">
        <button type="submit">Complete Order</button>
     </div>
   </form>
   <p id="checkout-message-status" style="margin-top: 15px; font-weight: 500;"></p>
 </div>
 
 <!-- Right Side: Dynamic Order Summary -->
 <div class="card" style="background: #fdf7ff; border: 1px dashed #c8a2c8;">
   <h2>Order Summary</h2>
   
   <!-- This div starts empty and is filled by JavaScript -->
   <div id="cart-items-container" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px;">
      <p style="color: #666; font-style: italic;">Your cart is currently empty.</p>
   </div>
   
   <p style="display: flex; justify-content: space-between;">
     <span>Subtotal</span>
     <span id="summary-subtotal">$0.00</span>
   </p>
   <p style="display: flex; justify-content: space-between; color: #666;">
     <span>Shipping</span>
     <span>FREE</span>
   </p>
   <hr style="border: 0; border-top: 1px solid #c8a2c8; margin: 15px 0;">
   <p style="display: flex; justify-content: space-between; font-size: 20px; font-weight: bold;">
     <span>Total</span>
     <span id="summary-total">$0.00</span>
   </p>
 </div>
 
</section>
 
<footer>
  <p>© Radiara — Rituals for the modern soul.</p>
</footer>
 
</body>
</html>
